name: operational-conversion-pages

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/operational-conversion-pages.yml"
      - "tools/analysis/generate_split_models_operational_conversion_dashboard.py"
      - "output/split_models_operational_conversion_current_state.json"
      - "output/split_models_operational_conversion_manifest.json"
      - "output/split_models_operational_conversion_handoff/handoff_summary.json"
      - "output/split_models_operational_conversion_closure/closure_summary.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: operational-conversion-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate dashboard
        run: python tools/analysis/generate_split_models_operational_conversion_dashboard.py

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp output/split_models_operational_conversion_dashboard/dashboard.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
